<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>thIAguinho Hub - Acesso ao Ecossistema Digital</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            max-width: 450px;
            width: 90%;
        }
        .logo-area {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo-area h1 {
            color: #00d4ff;
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
        }
        .logo-area p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.1rem;
        }
        .form-control {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
        }
        .form-control:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: #00d4ff;
            color: white;
            box-shadow: 0 0 0 0.2rem rgba(0, 212, 255, 0.25);
        }
        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        .input-group-text {
            background: rgba(0, 212, 255, 0.2);
            border: 1px solid rgba(0, 212, 255, 0.3);
            color: #00d4ff;
        }
        .btn-login {
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            border: none;
            color: white;
            padding: 15px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 1.1rem;
            width: 100%;
            margin-top: 20px;
            transition: transform 0.2s;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 212, 255, 0.3);
            color: white;
        }
        .footer {
            text-align: center;
            margin-top: 30px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
        }
        .alert {
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo-area">
            <h1><i class="bi bi-hexagon-fill me-2"></i>THIAGUINHO HUB</h1>
            <p>Ecossistema Global de Soluções</p>
        </div>

        <div id="alertContainer"></div>

        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label text-white-50"><i class="bi bi-person-circle me-2"></i>Usuário / Identificação</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" class="form-control" id="inputUser" placeholder="Digite seu usuário" required autocomplete="username">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label text-white-50"><i class="bi bi-shield-lock me-2"></i>Chave de Segurança</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-key"></i></span>
                    <input type="password" class="form-control" id="inputPass" placeholder="Digite sua senha" required autocomplete="current-password">
                </div>
            </div>

            <button type="submit" class="btn btn-login" id="btnLogin">
                <i class="bi bi-box-arrow-in-right me-2"></i>INICIAR SESSÃO SEGURA
            </button>
        </form>

        <div class="footer">
            <p class="mb-0">Powered by thIAguinho Soluções Digitais© 2026</p>
        </div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <script>
        // Configuração Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyBqIuCsHHuy_f-mBWV4JBkbyOorXpqQvqg",
            authDomain: "hub-thiaguinho.firebaseapp.com",
            projectId: "hub-thiaguinho",
            storageBucket: "hub-thiaguinho.firebasestorage.app",
            messagingSenderId: "453508098543",
            appId: "1:453508098543:web:305f4d48edd9be40bd6e1a"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();

        // Função de Login
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const user = document.getElementById('inputUser').value.trim();
            const pass = document.getElementById('inputPass').value.trim();
            const btnLogin = document.getElementById('btnLogin');
            
            if (!user || !pass) {
                showAlert('Preencha usuário e senha!', 'danger');
                return;
            }

            btnLogin.disabled = true;
            btnLogin.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Autenticando...';

            try {
                // 1. Verifica se é o Super Admin (Hardcoded - mude a senha em produção!)
                if (user === 'admin' && pass === 'admin123') {
                    sessionStorage.setItem('t_role', 'superadmin');
                    sessionStorage.setItem('f_nome', 'Super Admin');
                    sessionStorage.setItem('t_nome', 'thIAguinho Digital');
                    window.location.href = 'superadmin.html';
                    return;
                }

                // 2. Verifica se é um Cliente (Tenant) na coleção 'oficinas'
                const query = await db.collection('oficinas')
                    .where('usuarioAdmin', '==', user)
                    .get();

                if (!query.empty) {
                    const doc = query.docs[0];
                    const data = doc.data();
                    
                    // Verifica senha e status
                    if (data.senhaAdmin === pass) {
                        if (data.status === 'Bloqueado' || data.status === 'suspenso') {
                            showAlert('Sistema bloqueado. Contate o suporte.', 'danger');
                            btnLogin.disabled = false;
                            btnLogin.innerHTML = '<i class="bi bi-box-arrow-in-right me-2"></i>INICIAR SESSÃO SEGURA';
                            return;
                        }

                        // Login Cliente - Sucesso
                        sessionStorage.setItem('t_id', doc.id);
                        sessionStorage.setItem('t_nome', data.nome);
                        sessionStorage.setItem('t_role', 'admin');
                        sessionStorage.setItem('f_nome', data.usuarioAdmin);
                        sessionStorage.setItem('t_cloudName', data.configuracoes?.cloudinaryName || 'dmuvm1o6m');
                        sessionStorage.setItem('t_cloudPreset', data.configuracoes?.cloudinaryPreset || 'evolution');
                        
                        window.location.href = 'painel_oficina.html';
                    } else {
                        showAlert('Senha incorreta!', 'danger');
                        btnLogin.disabled = false;
                        btnLogin.innerHTML = '<i class="bi bi-box-arrow-in-right me-2"></i>INICIAR SESSÃO SEGURA';
                    }
                } else {
                    showAlert('Usuário não encontrado!', 'danger');
                    btnLogin.disabled = false;
                    btnLogin.innerHTML = '<i class="bi bi-box-arrow-in-right me-2"></i>INICIAR SESSÃO SEGURA';
                }

            } catch (error) {
                console.error('Erro login:', error);
                showAlert('Erro de conexão: ' + error.message, 'danger');
                btnLogin.disabled = false;
                btnLogin.innerHTML = '<i class="bi bi-box-arrow-in-right me-2"></i>INICIAR SESSÃO SEGURA';
            }
        });

        function showAlert(message, type) {
            const alertContainer = document.getElementById('alertContainer');
            alertContainer.innerHTML = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
            setTimeout(() => {
                const alert = alertContainer.querySelector('.alert');
                if (alert) alert.remove();
            }, 5000);
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
